name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-vps
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            -czf /tmp/30seconds-release.tar.gz .

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          TARGET_PATH="${VPS_PATH:-/opt/30seconds}"
          ssh "$VPS_USER@$VPS_HOST" "mkdir -p '$TARGET_PATH'"
          scp /tmp/30seconds-release.tar.gz "$VPS_USER@$VPS_HOST:$TARGET_PATH/release.tar.gz"

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          TARGET_PATH="${VPS_PATH:-/opt/30seconds}"
          ssh "$VPS_USER@$VPS_HOST" "
            set -e
            cd '$TARGET_PATH'
            tar -xzf release.tar.gz
            docker compose -f docker-compose.nginx.yml up -d --build
            docker compose ps
          "
